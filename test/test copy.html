<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiragana Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-linear-to-br from-indigo-100 to-blue-200 p-4 text-black">

  <h1 class="text-3xl font-bold mb-4">Hiragana Practice</h1>

  <!-- Mode Switch -->
  <div class="mb-4">
    <button id="hiraganaMode" class="px-4 py-2 rounded-l bg-indigo-600 text-white">
      Hiragana → English
    </button>
    <button id="englishMode" class="px-4 py-2 rounded-r bg-white border text-black">
      English → Hiragana
    </button>
  </div>

  <!-- Question -->
  <div id="question" class="text-7xl font-bold mb-6 text-indigo-900"></div>

  <!-- Options -->
  <div id="options" class="grid grid-cols-2 gap-4"></div>

  <!-- Score -->
  <div class="mt-6 text-lg font-semibold">
    Score: <span id="score">0</span>
  </div>

  <!-- Popup -->
  <div id="popup" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-xl text-center shadow-xl">
      <h2 class="text-xl font-bold text-red-600 mb-2">Wrong Answer ❌</h2>
      <p class="mb-2">Correct answer:</p>
      <p id="correctAnswer" class="text-3xl font-bold text-indigo-700 mb-4"></p>
      <button id="continueBtn" class="px-6 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">
        Continue
      </button>
    </div>
  </div>

<script>
const hiraganaMap = {
  あ: "a", い: "i", う: "u", え: "e", お: "o",
  か: "ka", き: "ki", く: "ku", け: "ke", こ: "ko",
  さ: "sa", し: "shi", す: "su", せ: "se", そ: "so",
  た: "ta", ち: "chi", つ: "tsu", て: "te", と: "to",
  な: "na", に: "ni", ぬ: "nu", ね: "ne", の: "no",
  は: "ha", ひ: "hi", ふ: "fu", へ: "he", ほ: "ho",
  ま: "ma", み: "mi", む: "mu", め: "me", も: "mo",
  や: "ya", ゆ: "yu", よ: "yo",
  ら: "ra", り: "ri", る: "ru", れ: "re", ろ: "ro",
  わ: "wa", を: "wo", ん: "n",
};

const hiraganaList = Object.entries(hiraganaMap);

let mode = "hiragana";
let score = 0;
let currentQuestion = null;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const scoreEl = document.getElementById("score");
const popup = document.getElementById("popup");
const correctAnswerEl = document.getElementById("correctAnswer");

function getRandomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function generateQuestion() {
  const random = getRandomItem(hiraganaList);
  currentQuestion = random;

  const correct = mode === "hiragana" ? random[1] : random[0];

  let wrongOptions = shuffle(hiraganaList)
    .filter(x => x[0] !== random[0])
    .slice(0, 3)
    .map(x => mode === "hiragana" ? x[1] : x[0]);

  const allOptions = shuffle([correct, ...wrongOptions]);

  questionEl.textContent = mode === "hiragana" ? random[0] : random[1];

  optionsEl.innerHTML = "";
  allOptions.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "px-6 py-3 text-xl border rounded bg-white text-black hover:bg-indigo-600 hover:text-white transition";
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(opt);
    optionsEl.appendChild(btn);
  });
}

function handleAnswer(ans) {
  const correct = mode === "hiragana" ? currentQuestion[1] : currentQuestion[0];

  if (ans === correct) {
    score++;
    scoreEl.textContent = score;
    generateQuestion();
  } else {
    correctAnswerEl.textContent = correct;
    popup.classList.remove("hidden");
  }
}

document.getElementById("continueBtn").onclick = () => {
  popup.classList.add("hidden");
  generateQuestion();
};

document.getElementById("hiraganaMode").onclick = () => {
  mode = "hiragana";
  updateModeUI();
  generateQuestion();
};

document.getElementById("englishMode").onclick = () => {
  mode = "english";
  updateModeUI();
  generateQuestion();
};

function updateModeUI() {
  const hBtn = document.getElementById("hiraganaMode");
  const eBtn = document.getElementById("englishMode");

  if (mode === "hiragana") {
    hBtn.className = "px-4 py-2 rounded-l bg-indigo-600 text-white";
    eBtn.className = "px-4 py-2 rounded-r bg-white border text-black";
  } else {
    eBtn.className = "px-4 py-2 rounded-r bg-indigo-600 text-white";
    hBtn.className = "px-4 py-2 rounded-l bg-white border text-black";
  }
}

generateQuestion();
</script>

</body>
</html>
