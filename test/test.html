<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hiragana Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-indigo-100 to-blue-200 p-4 text-black">

  <!-- Title -->
  <h1 class="text-3xl font-bold mb-6">Hiragana Practice</h1>

  <!-- Mode Switch (Static) -->
  <div class="mb-6">
    <button class="px-4 py-2 rounded-l bg-indigo-600 text-white">
      Hiragana → English
    </button>
    <button class="px-4 py-2 rounded-r bg-white border text-black">
      English → Hiragana
    </button>
  </div>

  <!-- Question (Dummy Data) -->
  <div class="text-7xl font-bold mb-8 text-indigo-900">
    あ
  </div>

  <!-- Options (Dummy Data) -->
  <div class="grid grid-cols-2 gap-4 mb-8">
    <button class="px-6 py-3 text-xl border rounded bg-white hover:bg-indigo-600 hover:text-white transition">
      a
    </button>
    <button class="px-6 py-3 text-xl border rounded bg-white hover:bg-indigo-600 hover:text-white transition">
      i
    </button>
    <button class="px-6 py-3 text-xl border rounded bg-white hover:bg-indigo-600 hover:text-white transition">
      u
    </button>
    <button class="px-6 py-3 text-xl border rounded bg-white hover:bg-indigo-600 hover:text-white transition">
      e
    </button>
  </div>

  <!-- Score (Dummy) -->
  <div class="text-lg font-semibold mb-6">
    Score: 5
  </div>

  <!-- Popup Example (Visible Version - Static Demo) -->
  <!-- <div class="fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl text-center shadow-xl">
      <h2 class="text-xl font-bold text-red-600 mb-2">
        Wrong Answer ❌
      </h2>
      <p class="mb-2">Correct answer:</p>
      <p class="text-3xl font-bold text-indigo-700 mb-4">
        a
      </p>
      <button class="px-6 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">
        Continue
      </button>
    </div>
  </div> -->

</body>
</html>
